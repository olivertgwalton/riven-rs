	anilistRating(id: Int!): AnilistRating!
	anilistMappings(id: Int!): AnilistMappings!
	resolveExternalId(from: String!, to: String!, id: String!, mediaType: String): IdResolution!
	ratings(indexer: String!, id: String!, mediaType: String): RatingsResponse!
	traktRecommendations(id: String!, idType: String!, mediaType: String!): [TraktListItem!]!
	tvdbSeries(id: Int!): JSON!
	tvdbSeriesExtended(id: Int!, meta: String): JSON!
	tvdbSearchRemoteId(remoteId: String!): JSON!
	tvdbPersonExtended(id: Int!, meta: String): JSON!
	tvdbEpisodes(id: Int!, seasonType: String!, lang: String!, page: Int): JSON!
	resolveTmdbToTvdb(tmdbId: String!): Int
	logs(limit: Int, level: String): [LogEntry!]!
	"""
	Per-provider NNTP health (connections + circuit-breaker state). Empty
	when usenet isn't configured.
	"""
	nntpProviders: [NntpProviderHealth!]!
	"""
	Per-title usenet health from the background availability scanner.
	Ordered worst-first (unhealthy, then most missing segments).
	"""
	usenetTitleHealth: [UsenetTitleHealth!]!
	"""
	Title-health counts grouped by status. The `WHERE EXISTS` filter must
	mirror `usenet_title_health` so the summary matches the listed rows.
	"""
	usenetTitleHealthSummary: UsenetTitleHealthSummary!
	"""
	Per-provider download traffic — lifetime totals + a daily series for
	the usage-trend chart.
	"""
	usenetTraffic: UsenetTraffic!
	"""
	Cache + fetch metrics for the in-process usenet streaming engine.
	"""
	usenetStreamingHealth: UsenetStreamingHealth!
	stats: LibraryStats!
	"""
	Get completed-item activity counts grouped by date (past year).
