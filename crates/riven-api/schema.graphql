	"""
	activity: JSON!
	"""
	Count of movies and shows per release year.
	"""
	yearReleases: [YearRelease!]!
	"""
	Get debrid account information for all configured stores.
	"""
	debridAccountInfo: [DebridUserInfo!]!
	"""
